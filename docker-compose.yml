services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: studyhub-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: studyhub-client
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:80"
    depends_on:
      - server